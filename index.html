<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Miner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #1a2438;
      --bg-bottom: #090d14;
      --panel: rgba(9, 16, 28, 0.88);
      --panel-border: rgba(164, 197, 220, 0.18);
      --text: #f2ede3;
      --accent: #e2a94b;
      --accent-2: #88b9d8;
      --danger: #d8645c;
      --shadow: rgba(0, 0, 0, 0.28);
      --font-ui: "Segoe UI", "Trebuchet MS", sans-serif;
      --font-display: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(136, 185, 216, 0.18), transparent 35%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: min(100vw, 1280px);
      height: min(100vh, 820px);
      padding: clamp(12px, 2vw, 24px);
    }

    .game-shell {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 60px var(--shadow);
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(180deg, rgba(19, 30, 48, 0.92), rgba(8, 12, 18, 0.96));
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
    }

    .hud,
    .status-card {
      width: fit-content;
      min-width: 260px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
    }

    .hud {
      display: grid;
      gap: 6px;
      justify-self: start;
    }

    .title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .resources,
    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .controls {
      opacity: 0.86;
      font-size: 0.85rem;
    }

    .status-card {
      align-self: end;
      justify-self: end;
      text-align: right;
    }

    .status-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-card p {
      margin: 0;
      line-height: 1.4;
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .frame {
        padding: 0;
        width: 100vw;
        height: 100vh;
      }

      .game-shell {
        border-radius: 0;
      }

      .overlay {
        padding: 12px;
      }

      .hud,
      .status-card {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="game-shell">
      <canvas id="game" width="1280" height="720" aria-label="Pocket Miner game canvas"></canvas>
      <div class="overlay" aria-hidden="true">
        <div class="hud">
          <div class="title">Pocket Miner</div>
          <div class="resources" id="resource-bar">
            <span>Coal: 0</span>
            <span>Iron: 0</span>
          </div>
          <div class="controls">Move: A/D or Arrows | Mine: E or Space | Jump: W or Up</div>
        </div>
        <div class="status-card">
          <strong>Status</strong>
          <p id="status-text">Loading assets and preparing the mine...</p>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
