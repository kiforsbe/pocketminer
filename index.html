<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Miner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #1a2438;
      --bg-bottom: #090d14;
      --panel: rgba(9, 16, 28, 0.88);
      --panel-border: rgba(164, 197, 220, 0.18);
      --text: #f2ede3;
      --accent: #e2a94b;
      --accent-2: #88b9d8;
      --danger: #d8645c;
      --shadow: rgba(0, 0, 0, 0.28);
      --font-ui: "Segoe UI", "Trebuchet MS", sans-serif;
      --font-display: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(136, 185, 216, 0.18), transparent 35%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: min(100vw, 1280px);
      height: min(100vh, 820px);
      padding: clamp(12px, 2vw, 24px);
    }

    .game-shell {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 60px var(--shadow);
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(180deg, rgba(19, 30, 48, 0.92), rgba(8, 12, 18, 0.96));
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
    }

    .hud,
    .status-card {
      width: fit-content;
      min-width: 260px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
    }

    .hud {
      display: grid;
      gap: 6px;
      justify-self: start;
    }

    .title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .resources,
    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .controls {
      opacity: 0.86;
      font-size: 0.85rem;
    }

    .status-card {
      align-self: end;
      justify-self: end;
      text-align: left;
      display: grid;
      gap: 12px;
      width: 190px;
      min-width: 190px;
      max-width: 190px;
    }

    .status-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-card p {
      margin: 0;
      line-height: 1.4;
      font-size: 0.92rem;
    }

    .survey-section {
      display: grid;
      gap: 8px;
      padding-top: 2px;
    }

    .survey-section + .survey-section {
      padding-top: 10px;
      border-top: 1px solid rgba(136, 185, 216, 0.14);
    }

    .survey-row {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 8px;
      align-items: center;
    }

    .survey-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(242, 237, 227, 0.12);
      background: rgba(255, 255, 255, 0.04);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .survey-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .survey-copy p {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .survey-subheading {
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(136, 185, 216, 0.88);
    }

    .ore-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .ore-groups {
      display: grid;
      gap: 8px;
    }

    .ore-group {
      display: grid;
      gap: 5px;
    }

    .ore-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 5px 2px 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.7rem;
      line-height: 1;
      color: rgba(242, 237, 227, 0.9);
      max-width: 100%;
    }

    .ore-chip canvas {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .compact-stats {
      display: grid;
      gap: 5px;
    }

    .compact-stat {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 4px;
      align-items: baseline;
      font-size: 0.78rem;
    }

    .compact-stat-label {
      color: rgba(136, 185, 216, 0.86);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.64rem;
    }

    .compact-stat-value {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 720px) {
      .frame {
        padding: 0;
        width: 100vw;
        height: 100vh;
      }

      .game-shell {
        border-radius: 0;
      }

      .overlay {
        padding: 12px;
      }

      .hud,
      .status-card {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="game-shell">
      <canvas id="game" width="1280" height="720" aria-label="Pocket Miner game canvas"></canvas>
      <div class="overlay" aria-hidden="true">
        <div class="hud">
          <div class="title">Pocket Miner</div>
          <div class="resources" id="resource-bar">
            <span>Coal: 0</span>
            <span>Iron: 0</span>
          </div>
          <div class="controls">Move: A/D or Arrows | Aim: Mouse | Mine: Left Click, E, or Space | Jump: W or Up</div>
        </div>
        <div class="status-card">
          <section class="survey-section">
            <strong>Survey</strong>
            <div class="survey-row">
              <canvas id="stratum-icon" class="survey-icon" width="44" height="44"></canvas>
              
              <div class="survey-copy">
                <p id="stratum-name">Loading strata...</p>
                <p id="stratum-depth">Depth band loading...</p>
              </div>
            </div>
            <div class="ore-groups">
              <div class="ore-group">
                <div class="survey-subheading">Core Ores</div>
                <div id="stratum-core-swatches" class="ore-swatches"></div>
              </div>
              <div class="ore-group">
                <div class="survey-subheading">Bonus Ores</div>
                <div id="stratum-bonus-swatches" class="ore-swatches"></div>
              </div>
            </div>
          </section>
          <section class="survey-section">
            <strong>Selected Block</strong>
            <div class="survey-row">
              <canvas id="block-icon" class="survey-icon" width="44" height="44"></canvas>
              
              <div class="survey-copy">
                <p id="block-name">None</p>
                <p id="block-type">No target</p>
              </div>
            </div>
            <div class="compact-stats">
              <div class="compact-stat">
                <div class="compact-stat-label">HP</div>
                <div id="block-hp" class="compact-stat-value">--</div>
              </div>
              <div class="compact-stat">
                <div class="compact-stat-label">Range</div>
                <div id="block-range" class="compact-stat-value">--</div>
              </div>
              <div class="compact-stat">
                <div class="compact-stat-label">Yield</div>
                <div id="block-yield" class="compact-stat-value">--</div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
